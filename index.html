<script>
const COMB_POR_KM  = 0.415;
const MANT_POR_KM  = 0.158;
const COSTOS_OP    = 515.86;

const FACTOR_VEHICULO = { "1": 0.82, "2": 1.00, "3": 1.18 };
const FACTOR_CARGA = { "1": 1.00, "2": 1.08, "3": 1.12, "4": 1.22 };
const FACTOR_DESTINO = { "1": 1.00, "2": 0.98, "3": 0.96, "4": 0.94, "5": 1.05 };
const FACTOR_MES = [1.02,0.98,1.00,1.01,0.99,1.03,1.02,1.00,0.99,1.01,1.04,1.05];

function predecir() {
  const distancia = parseInt(document.getElementById('distancia').value);
  const destino   = document.getElementById('destino').value;
  const vehiculo  = document.getElementById('vehiculo').value;
  const carga     = document.getElementById('tipoCarga').value;
  const mes       = parseInt(document.getElementById('mes').value);
  const peso      = parseFloat(document.getElementById('peso').value) || 20;
  const nviajes   = parseInt(document.getElementById('nviajes').value) || 4;

  const fv  = FACTOR_VEHICULO[vehiculo] || 1;
  const fc  = FACTOR_CARGA[carga] || 1;
  const fd  = FACTOR_DESTINO[destino] || 1;
  const fm  = FACTOR_MES[mes - 1] || 1;
  const fpe = 1 + (peso - 20) * 0.005;

  const combBase = distancia * COMB_POR_KM;
  const mantBase = distancia * MANT_POR_KM;
  const opBase = COSTOS_OP;

  const comb = combBase * fv * fc * fm;
  const mant = mantBase * fv * fpe;
  const op = opBase + (distancia * 0.05);

  const subtotal = comb + mant + op;
  const total = subtotal * fd;

  const ruido = total * (Math.random() * 0.04 - 0.02);
  const pred = total + ruido;
  const predKm = pred / distancia;
  const predMensual = pred * nviajes;

  document.getElementById('result-content').classList.add('show');
  document.getElementById('result-empty').style.display = 'none';

  document.getElementById('res-total').textContent = `$ ${pred.toFixed(2)} USD`;
  document.getElementById('res-km').textContent = `$ ${predKm.toFixed(2)} USD/km`;
  document.getElementById('res-mensual').textContent = `$ ${predMensual.toFixed(2)} USD`;
  document.getElementById('bd-comb').textContent = `$ ${comb.toFixed(2)} USD`;
  document.getElementById('bd-mant').textContent = `$ ${mant.toFixed(2)} USD`;
  document.getElementById('bd-op').textContent = `$ ${op.toFixed(2)} USD`;
  document.getElementById('bd-total').textContent = `$ ${pred.toFixed(2)} USD`;
}
</script>
